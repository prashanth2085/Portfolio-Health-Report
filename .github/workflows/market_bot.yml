name: Market Alert Bots

on:
  schedule:
    # Runs at 10:00 AM IST and 2:30 PM IST, Monday through Friday
    - cron: '30 4 * * 1-5'
    - cron: '0 9 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas yfinance requests openpyxl

      - name: Run Portfolio Scanner (Holdings File)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alert_bot.py

      - name: Run Smallcase Scanner (Watchlist)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python smallcase_bot.py
